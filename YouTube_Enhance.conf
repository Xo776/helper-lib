########################################
# 名称：    YouTube Enhance for Quantumult X
# 版本：    2026.05.26
# 作者：    @Maasea (原版脚本), @Xo776 (QX适配+自托管)
# 仓库：    https://github.com/Xo776/by-yt (私有)
# 功能：    去广告、画中画、后台播放、字幕翻译、导航栏精简
# 适用：    YouTube & YouTube Music
########################################

# ========== 使用说明 ==========
# 1. 将此文件放入 Quantumult X 的配置文件目录
# 2. 在 [general] 下添加：udp_drop_list=443
#    （这是关键！阻断 QUIC/UDP 迫使走 TCP，否则广告会绕过 MITM）
# 3. 在 [rewrite_local] 和 [mitm] 中分别引用本文件
# 4. 更新 mitm 证书信任
# ================================


# ========== 视频广告请求拦截 ==========
# 去除 googlevideo 广告参数 (ctier=L → 删除)
^(https?:\/\/[\w-]+\.googlevideo\.com\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) url 302 $1$2$3

# 拦截 initplayback 广告请求 (Map Local → 返回空数据)
# 参考 Maasea Jul 20, 2025 commit: feat:try to use initplayback
^https?:\/\/[\w-]+\.googlevideo\.com\/initplayback.+&oad url reject-200

# 拦截 googlevideo 的 overlay 广告请求
^https?:\/\/[\w-]+\.googlevideo\.com\/(?!(dclk_video_ads|videoplayback\?|initplayback)).+&oad url reject-200


# ========== 核心：Protobuf 二进制响应篡改 ==========
# 拦截所有 YouTube API v1 响应 → 解析 protobuf → 去广告/画中画/后台播放/翻译
# 注意：YouTube 同时使用 youtubei.googleapis.com 和 youtubei-att.googleapis.com 两个域名
# 参考 Issue #96 (2026.3): 发现YouTube APP还会使用youtubei-att.googleapis.com
^https?:\/\/youtubei(?:-att)?\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch) url script-response-body https://raw.githubusercontent.com/Xo776/by-yt/main/youtube.response.js


# ========== 统计/追踪广告请求 ==========
^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads url reject-200
^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) url reject-200
^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext url reject-200

# ========== MITM 主机名 ==========
# youtubei-att.googleapis.com 是 YouTube 新的 API 域名 (2026.3 发现)
hostname = *.googlevideo.com, youtubei.googleapis.com, youtubei-att.googleapis.com, www.youtube.com, s.youtube.com
