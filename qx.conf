########################################
# QX Ruleset - Media Helper (v3)
# 2026.05.26 / self-hosted / lightweight
########################################

# === IMPORTANT ===
# 1. Make sure ONLY this config is active (remove old ddgksf2013 YoutubeAds.conf!)
# 2. [mitm] must include the hostname below
# 3. udp_drop_list=443 is OPTIONAL - blocks QUIC ads but slows ALL apps
#    Try WITHOUT it first. Only add if ads still play.
#    Global UDP block → all app connections fall back to slower TCP.


# === Core Engine (protobuf processor) ===
^https?:\/\/youtubei(?:-att)?\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch) url script-response-body https://raw.githubusercontent.com/Xo776/helper-lib/main/media.js


# === Video Ad Block ===
# Reject overlay ads on video CDN (oad=overlay ad parameter)
^https?:\/\/[\w-]+\.googlevideo\.com\/.*&oad url reject-200


# === Tracker Block ===
^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads url reject-200
^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) url reject-200
^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext url reject-200

# === MITM ===
hostname = *.googlevideo.com, youtubei.googleapis.com, youtubei-att.googleapis.com, www.youtube.com, s.youtube.com
